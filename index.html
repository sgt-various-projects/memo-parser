<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>複合機能テキストボックス</title>
    <style>
        pre,
        code {
            font-family: "Fira Code", "JetBrains Mono", "Source Code Pro", Inconsolata, Menlo, Consolas, monospace;
            font-size: 0.9rem;
            line-height: 1.4;
            white-space: pre;
        }

        .dark-mode {
            background-color: #121212;
            color: #eee;
        }

        .dark-mode :is(textarea, input, button) {
            background-color: #222;
            color: #eee;
            border-color: #555;
        }

        .selected {
            background-color: #cceeff;
        }

        #customList {
            border: 1px solid #ccc;
            display: none;
            padding: 0;
            list-style: none;
            max-height: 200px;
            overflow-y: auto;
            position: absolute;
            background-color: black;
            width: 200px;
            margin: 0;
            z-index: 1000;
        }

        #customList li {
            padding: 4px;
            cursor: pointer;
        }

        #customList li.active {
            background-color: #324a3c;
        }

        #selectionBox {
            position: absolute;
            border: 1px dashed #00f;
            background-color: rgba(0, 0, 255, 0.1);
            display: none;
            pointer-events: none;
            z-index: 999;
        }

        .input-row {
            display: flex;
            align-items: flex-start;
            margin-bottom: 5px;
        }

        .textbox {
            width: 400px;
            height: 25px;
            margin-top: 0;
            margin-right: 10px;
            margin-bottom: 10px;
            margin-left: 10px;
        }

        .textarea {
            width: 800px;
            height: 70px;
        }

        #importBox {
            width: 600px;
            height: 400px;
        }
    </style>
</head>

<body class="dark-mode">
    how to use : TBD3
    <br>
    <button class="toggle" onclick="toggleDarkMode()">🌙 switch dark mode</button>
    <button type="button" onclick="reloadPage()">reload</button>
    <button id="toggleBtn" onclick="toggleImportSection()">🔽 hide import text area</button>
    <div id="importSection">
        <h3>📥 import text area</h3>
        <textarea id="importBox" placeholder="空行で区切られたテキストブロックをここに貼り付けてください"></textarea>
        <br><br>
        expand by
        <button onclick="expandToTextareas()">▶ row text</button>
        <button onclick="expandToTextareasByOrg()">▶ org text(only lv2)</button>
    </div>
    <hr>
    <br>
    <h3>📥 export text area</h3>
    <textarea id="orgExportArea" style="width: 800px; height: 400px;" placeholder="org-mode形式の出力がここに表示されます"></textarea>
    <br><br>
    <button onclick="sortByTextbox()">sort</button>
    export to
    <button onclick="outputToTextarea()">📤 text area</button><button onclick="exportToOrg()">📄org file </button>
    <hr><br>
    <form autocomplete="off">
        <div id="container">
            <div class="input-row">
                <input type="search" class="textbox" autocomplete="off" tabindex="1">
                <textarea class="textarea" placeholder="名前に関するメモなど..."></textarea>
            </div>
            <div class="input-row">
                <input type="search" class="textbox" autocomplete="off" tabindex="2">
                <textarea class="textarea" placeholder="名前に関するメモなど..."></textarea>
            </div>
            <div class="input-row">
                <input type="search" class="textbox" autocomplete="off" tabindex="3">
                <textarea class="textarea" placeholder="名前に関するメモなど..."></textarea>
            </div>
            <div class="input-row">
                <input type="search" class="textbox" autocomplete="off" tabindex="4">
                <textarea class="textarea" placeholder="名前に関するメモなど..."></textarea>
            </div>
            <div class="input-row">
                <input type="search" class="textbox" autocomplete="off" tabindex="5">
                <textarea class="textarea" placeholder="名前に関するメモなど..."></textarea>
            </div>
        </div>
        <ul id="customList"></ul>
        <div id="selectionBox"></div>
    </form>
    <script>
        document.addEventListener('keydown', function (e) {
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'r') {
                e.preventDefault();
            }
        });

        function reloadPage() {
            window.location.reload();
        }

        window.addEventListener('wheel', function (e) {
            if (e.ctrlKey) {
                e.preventDefault();
                window.scrollBy({ top: e.deltaY, left: e.deltaX, behavior: 'auto' });
            }
        }, { passive: false });

        const container = document.getElementById('container');

        // キーボードナビゲーション (event delegation で動的追加行にも対応)
        container.addEventListener('keydown', function (e) {
            const target = e.target;

            if (e.key === 'ArrowRight' && target.classList.contains('textbox')) {
                const isAtEnd = target.selectionStart === target.selectionEnd && target.selectionEnd === target.value.length;
                if (isAtEnd) {
                    const ta = target.closest('.input-row').querySelector('.textarea');
                    if (ta) { e.preventDefault(); ta.focus(); }
                }
                return;
            }

            if (!target.classList.contains('textarea')) return;

            if (e.key === 'ArrowLeft') {
                const isAtStart = target.selectionStart === 0 && target.selectionEnd === 0;
                if (isAtStart) {
                    const tb = target.closest('.input-row').querySelector('.textbox');
                    if (tb) {
                        e.preventDefault();
                        tb.focus();
                        tb.setSelectionRange(tb.value.length, tb.value.length);
                    }
                }
                return;
            }

            const allTas = Array.from(container.querySelectorAll('.textarea'));
            const idx = allTas.indexOf(target);
            const lineNum = target.value.slice(0, target.selectionStart).split('\n').length;

            if (e.key === 'ArrowDown') {
                if (lineNum === target.value.split('\n').length && idx < allTas.length - 1) {
                    e.preventDefault();
                    allTas[idx + 1].focus();
                }
            } else if (e.key === 'ArrowUp') {
                if (lineNum === 1 && idx > 0) {
                    e.preventDefault();
                    allTas[idx - 1].focus();
                }
            }
        });

        const list = document.getElementById('customList');
        const selectionBox = document.getElementById('selectionBox');
        const items = ['りんご', 'ぶどあ', 'ぶどう', 'ぶどうジュース', 'パイナップル'];
        let activeIndex = -1;
        let currentInput = null;
        let lastCommittedValue = '';
        let isSelecting = false;
        let isCtrlPressed = false;
        let cachedTextboxes = null;
        let startX, startY;

        window.addEventListener('blur', () => { isCtrlPressed = false; });
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) isCtrlPressed = false;
        });

        function showList(input) {
            currentInput = input;
            const val = input.value.toLowerCase();
            list.innerHTML = '';
            activeIndex = -1;

            if (!val) {
                list.style.display = 'none';
                return;
            }

            const rect = input.getBoundingClientRect();
            list.style.top = `${window.scrollY + rect.bottom}px`;
            list.style.left = `${window.scrollX + rect.left}px`;
            list.style.width = `${rect.width}px`;

            const filtered = items.filter(item => item.includes(val) && item.toLowerCase() !== val);

            if (filtered.length === 0) {
                list.style.display = 'none';
                return;
            }

            filtered.forEach(item => {
                const li = document.createElement('li');
                li.textContent = item;
                li.addEventListener('mousedown', () => {
                    input.value = item;
                    lastCommittedValue = item;
                    list.style.display = 'none';
                });
                list.appendChild(li);
            });

            list.style.display = 'block';
        }

        function updateActiveOption(options) {
            options.forEach((li, idx) => {
                li.classList.toggle('active', idx === activeIndex);
                if (idx === activeIndex) li.scrollIntoView({ block: 'nearest' });
            });
        }

        document.addEventListener('click', (e) => {
            if (currentInput && e.target !== currentInput && !list.contains(e.target)) {
                list.style.display = 'none';
                activeIndex = -1;
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Control') isCtrlPressed = true;
        });

        document.addEventListener('keyup', (e) => {
            if (e.key !== 'Control') return;
            isCtrlPressed = false;
            const selectedBoxes = Array.from(document.querySelectorAll('.textbox.selected'));
            if (selectedBoxes.length <= 1) return;

            const value = prompt('入力する値を指定してください：');
            selectedBoxes.forEach(el => {
                if (value !== null) el.value = value;
                el.blur();
                el.classList.remove('selected');
            });

            if (value !== null) {
                const allBoxes = Array.from(document.querySelectorAll('.textbox'));
                const lastIndex = allBoxes.indexOf(selectedBoxes[selectedBoxes.length - 1]);
                if (lastIndex >= 0 && lastIndex + 1 < allBoxes.length) {
                    allBoxes[lastIndex + 1].focus();
                }
            }
        });

        const INTERACTIVE_TAGS = new Set(['INPUT', 'TEXTAREA', 'BUTTON', 'SELECT', 'A', 'LABEL']);

        document.addEventListener('mousedown', (e) => {
            if (e.target.classList.contains('textbox') && isCtrlPressed) {
                e.target.classList.toggle('selected');
                return;
            }

            if (!INTERACTIVE_TAGS.has(e.target.tagName)) {
                isSelecting = true;
                startX = e.pageX;
                startY = e.pageY;
                cachedTextboxes = Array.from(document.querySelectorAll('.textbox'));

                selectionBox.style.left = startX + 'px';
                selectionBox.style.top = startY + 'px';
                selectionBox.style.width = '0px';
                selectionBox.style.height = '0px';
                selectionBox.style.display = 'block';

                cachedTextboxes.forEach(el => el.classList.remove('selected'));
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (!isSelecting) return;

            const x = Math.min(e.pageX, startX);
            const y = Math.min(e.pageY, startY);
            const w = Math.abs(e.pageX - startX);
            const h = Math.abs(e.pageY - startY);

            selectionBox.style.left = x + 'px';
            selectionBox.style.top = y + 'px';
            selectionBox.style.width = w + 'px';
            selectionBox.style.height = h + 'px';

            const boxRect = selectionBox.getBoundingClientRect();
            cachedTextboxes.forEach(el => {
                const rect = el.getBoundingClientRect();
                const overlap = !(rect.right < boxRect.left || rect.left > boxRect.right ||
                    rect.bottom < boxRect.top || rect.top > boxRect.bottom);
                el.classList.toggle('selected', overlap);
            });
        });

        document.addEventListener('mouseup', () => {
            if (!isSelecting) return;
            isSelecting = false;
            cachedTextboxes = null;
            selectionBox.style.display = 'none';

            const selectedBoxes = Array.from(document.querySelectorAll('.textbox.selected'));
            if (selectedBoxes.length <= 1) return;

            const value = prompt('入力する値を指定してください：');
            selectedBoxes.forEach(el => {
                if (value !== null) el.value = value;
                el.blur();
                el.classList.remove('selected');
            });

            if (value !== null) {
                const allBoxes = Array.from(document.querySelectorAll('.textbox'));
                const lastIndex = allBoxes.indexOf(selectedBoxes[selectedBoxes.length - 1]);
                if (lastIndex >= 0 && lastIndex + 1 < allBoxes.length) {
                    allBoxes[lastIndex + 1].focus();
                }
            }
        });

        function buildOutlineMap(rows) {
            const outlineMap = new Map();
            rows.forEach(row => {
                const title = row.querySelector('.textbox').value.trim() || '未整理';
                const content = row.querySelector('.textarea').value.trim();
                if (content === '') return;
                if (!outlineMap.has(title)) outlineMap.set(title, []);
                outlineMap.get(title).push(content);
            });
            return outlineMap;
        }

        function sortByTextbox() {
            const rows = Array.from(container.getElementsByClassName('input-row'));
            rows.sort((a, b) => {
                const aVal = a.querySelector('.textbox').value;
                const bVal = b.querySelector('.textbox').value;
                return aVal.localeCompare(bVal, 'ja');
            });
            container.innerHTML = '';
            rows.forEach(row => container.appendChild(row));
        }

        function exportToOrg() {
            const outlineMap = buildOutlineMap(document.querySelectorAll('.input-row'));
            if (outlineMap.size === 0) {
                alert('出力する内容がありません。');
                return;
            }

            const sortedMap = new Map([...outlineMap].sort((a, b) => a[0].localeCompare(b[0])));
            let orgText = '';
            for (const [title, contents] of sortedMap) {
                orgText += `** ${title}\n\n`;
                contents.forEach(text => { orgText += `${text}\n\n\n`; });
            }

            const url = URL.createObjectURL(new Blob([orgText], { type: 'text/plain' }));
            const a = document.createElement('a');
            a.href = url;
            a.download = 'export.org';
            a.click();
            setTimeout(() => URL.revokeObjectURL(url), 0);
        }

        function splitImportIntoBlocks(raw) {
            const normalized = String(raw)
                .replace(/^﻿/, '')
                .replace(/\r\n/g, '\n')
                .replace(/\r/g, '\n');

            const lines = normalized.split('\n');
            const blocks = [];
            let current = [];
            let inFence = false;

            for (let idx = 0; idx < lines.length; idx++) {
                const line = lines[idx];

                if (/^\s*```/.test(line)) {
                    current.push(line);
                    inFence = !inFence;
                    continue;
                }

                if (!inFence && line === '') {
                    if (current.length > 0) {
                        const trimmedBlock = current.join('\n').trim();
                        if (trimmedBlock !== '') blocks.push(trimmedBlock);
                        current = [];
                    }
                    while (idx + 1 < lines.length && lines[idx + 1] === '') idx++;
                    continue;
                }

                current.push(line);
            }

            const trimmedBlock = current.join('\n').trim();
            if (trimmedBlock !== '') blocks.push(trimmedBlock);
            return blocks;
        }

        function createInputRow() {
            const row = document.createElement('div');
            row.className = 'input-row';

            const input = document.createElement('input');
            input.type = 'search';
            input.className = 'textbox';
            input.tabIndex = container.querySelectorAll('.textbox').length + 1;
            input.autocomplete = 'off';
            setupAutocomplete(input);

            const textarea = document.createElement('textarea');
            textarea.className = 'textarea';

            row.appendChild(input);
            row.appendChild(textarea);
            return row;
        }

        function ensureRowCount(n) {
            const existing = container.querySelectorAll('.textarea').length;
            for (let i = existing; i < n; i++) {
                container.appendChild(createInputRow());
            }
        }

        function expandToTextareas() {
            const blocks = splitImportIntoBlocks(document.getElementById('importBox').value);
            ensureRowCount(blocks.length);
            const textareas = container.querySelectorAll('.textarea');
            for (let i = 0; i < blocks.length; i++) {
                textareas[i].value = blocks[i];
                textareas[i].style.height = 'auto';
                textareas[i].style.height = textareas[i].scrollHeight + 'px';
            }
        }

        const OUTLINE_LV2_RE = /^\*\* /;

        function isOutlineLv2(block) {
            return OUTLINE_LV2_RE.test(block);
        }

        function parseOutlineLv2Title(block) {
            const title = block.slice(3).trim();
            return title === '' ? 'blank' : title;
        }

        function countRowsForOrgExpand(blocks) {
            return blocks.filter(b => !isOutlineLv2(b)).length;
        }

        function expandToTextareasByOrg() {
            const blocks = splitImportIntoBlocks(document.getElementById('importBox').value);
            ensureRowCount(Math.max(countRowsForOrgExpand(blocks), 1));

            const textareas = container.querySelectorAll('.textarea');
            const textboxes = container.querySelectorAll('.textbox');
            let spacedHeading = '';
            let bodyRow = 0;

            for (const block of blocks) {
                if (isOutlineLv2(block)) {
                    spacedHeading = parseOutlineLv2Title(block);
                    continue;
                }

                textboxes[bodyRow].value = spacedHeading !== ''
                    ? spacedHeading
                    : (bodyRow > 0 ? textboxes[bodyRow - 1].value : '');
                textareas[bodyRow].value = block;
                textareas[bodyRow].style.height = 'auto';
                textareas[bodyRow].style.height = textareas[bodyRow].scrollHeight + 'px';
                bodyRow++;
            }
        }

        function toggleImportSection() {
            const section = document.getElementById('importSection');
            const btn = document.getElementById('toggleBtn');
            const isHidden = section.style.display === 'none';
            section.style.display = isHidden ? 'block' : 'none';
            btn.textContent = isHidden ? '🔽 hide import text area' : '🔼 show import text area';
        }

        function setupAutocomplete(input) {
            input.addEventListener('input', () => showList(input));

            input.addEventListener('change', () => {
                const val = input.value.trim();
                if (!val) return;
                const idx = items.indexOf(val);
                if (idx !== -1) items.splice(idx, 1);
                items.unshift(val);
                lastCommittedValue = val;
                showList(input);
            });

            input.addEventListener('blur', () => {
                const val = input.value.trim();
                if (val && !items.includes(val)) items.unshift(val);
            });

            input.addEventListener('keydown', (e) => {
                const options = list.querySelectorAll('li');

                if (e.altKey && e.key.toLowerCase() === 'u') {
                    e.preventDefault();
                    if (lastCommittedValue) {
                        input.value = lastCommittedValue;
                        showList(input);
                    }
                    return;
                }

                if (list.style.display !== 'block' || options.length === 0) return;

                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    activeIndex = (activeIndex + 1) % options.length;
                    updateActiveOption(options);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    activeIndex = (activeIndex - 1 + options.length) % options.length;
                    updateActiveOption(options);
                } else if (e.key === 'Enter' && activeIndex >= 0) {
                    e.preventDefault();
                    input.value = options[activeIndex].textContent;
                    lastCommittedValue = input.value;
                    list.style.display = 'none';
                    activeIndex = -1;
                }
            });

            input.addEventListener('focusout', () => {
                setTimeout(() => {
                    if (!list.contains(document.activeElement)) {
                        list.style.display = 'none';
                        activeIndex = -1;
                    }
                }, 10);
            });
        }

        document.querySelectorAll('.textbox').forEach(setupAutocomplete);

        function outputToTextarea() {
            const outlineMap = buildOutlineMap(document.querySelectorAll('.input-row'));
            const sortedMap = new Map([...outlineMap].sort((a, b) => a[0].localeCompare(b[0])));

            if (sortedMap.has('未整理')) {
                const v = sortedMap.get('未整理');
                sortedMap.delete('未整理');
                sortedMap.set('未整理', v);
            }

            let orgText = '';
            for (const [title, contents] of sortedMap) {
                orgText += `** ${title}\n\n`;
                contents.forEach(text => { orgText += `${text}\n\n\n`; });
            }

            document.getElementById('orgExportArea').value = orgText;
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }
    </script>
</body>

</html>
