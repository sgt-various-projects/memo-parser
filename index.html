<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>複合機能テキストボックス</title>
    <style>
        pre,
        code {
            font-family: "Fira Code", "JetBrains Mono", "Source Code Pro", Inconsolata, Menlo, Consolas, monospace;
            font-size: 0.9rem;
            /* 適宜調整 */
            line-height: 1.4;
            /* 見やすさのため少し余裕を持たせる */
            white-space: pre;
            /* 改行・空白を忠実に表現 */
        }

        .dark-mode {
            background-color: #121212;
            color: #eee;
        }

        .dark-mode :is(textarea, input, button) {
            background-color: #222;
            color: #eee;
            border-color: #555;
        }

        .textbox {
            width: 200px;
            margin: 10px;
            display: block;
        }

        .selected {
            background-color: #cceeff;
        }

        #customList {
            border: 1px solid #ccc;
            display: none;
            padding: 0;
            list-style: none;
            max-height: 200px;
            overflow-y: auto;
            position: absolute;
            background-color: black;
            width: 200px;
            margin: 0;
            z-index: 1000;
        }

        #customList li {
            padding: 4px;
            cursor: pointer;
        }

        #customList li.active {
            background-color: #324a3c;
        }

        #selectionBox {
            position: absolute;
            border: 1px dashed #00f;
            background-color: rgba(0, 0, 255, 0.1);
            display: none;
            pointer-events: none;
            z-index: 999;
        }


        .input-row {
            display: flex;
            align-items: flex-start;
            /* ← これで上ぞろえ */
            margin-bottom: 5px;
        }

        .textbox {
            width: 400px;
            height: 25px;
            margin-right: 10px;
            margin-top: 0px;
        }

        .textarea {
            width: 800px;
            height: 70px;
        }

        #importBox {
            width: 600px;
            height: 400px;
        }
    </style>
</head>

<body class="dark-mode">
    how to use : TBD3
    <br>
    <button class="toggle" onclick="toggleDarkMode()">🌙 switch dark mode</button>
    <button id="toggleBtn" onclick="toggleImportSection()">🔽 hide import text area</button>
    <div id="importSection">
        <h3>📥 import text area</h3>
        <textarea id="importBox" placeholder="空行で区切られたテキストブロックをここに貼り付けてください"></textarea>
        <br><br>
        expand by
        <button onclick="expandToTextareas()">▶ row text</button>
        <button onclick="expandToTextareasByOrg()">▶ org text(only lv2)</button>
    </div>
    <hr>
    <br>
    <h3>📥 export text area</h3>    
    <textarea id="orgExportArea" style="width: 800px; height: 400px;" placeholder="org-mode形式の出力がここに表示されます"></textarea>
    <br><br>
    <button onclick="sortByTextbox()">sort</button>
    export to
    <button onclick="outputToTextarea()">📤 text area</button><button onclick="exportToOrg()">📄org file </button>
    <hr><br>
    <form autocomplete="off">
        <div id="container">
            <div class="input-row">
                <input type="search" class="textbox" autocomplete="off" tabindex="1">
                <textarea class="textarea" placeholder="名前に関するメモなど..."></textarea>
            </div>
            <div class="input-row">
                <input type="search" class="textbox" autocomplete="off" tabindex="2">
                <textarea class="textarea" placeholder="名前に関するメモなど..."></textarea>
            </div>
            <div class="input-row">
                <input type="search" class="textbox" autocomplete="off" tabindex="3">
                <textarea class="textarea" placeholder="名前に関するメモなど..."></textarea>
            </div>
            <div class="input-row">
                <input type="search" class="textbox" autocomplete="off" tabindex="4">
                <textarea class="textarea" placeholder="名前に関するメモなど..."></textarea>
            </div>
            <div class="input-row">
                <input type="search" class="textbox" autocomplete="off" tabindex="5">
                <textarea class="textarea" placeholder="名前に関するメモなど..."></textarea>
            </div>
        </div>
        <ul id="customList"></ul>
        <div id="selectionBox"></div>
    </form>
    <script>
        window.addEventListener('wheel', function (e) {
            if (e.ctrlKey) {
                // 拡大縮小のデフォルト動作を防ぐ
                e.preventDefault();

                // スクロールを強制的に行う
                window.scrollBy({
                    top: e.deltaY,
                    left: e.deltaX,
                    behavior: 'auto'
                });
            }
        }, { passive: false }); // ← e.preventDefault() を有効にするには必要

        // テキストボックス → テキストエリア 右矢印
        document.querySelectorAll('.input-row .textbox').forEach(textbox => {
            textbox.addEventListener('keydown', function (event) {
                if (event.key === 'ArrowRight') {
                    const isAtEnd = this.selectionStart === this.selectionEnd && this.selectionEnd === this.value.length;
                    if (isAtEnd) {
                        const textarea = this.closest('.input-row').querySelector('.textarea');
                        if (textarea) {
                            event.preventDefault();
                            textarea.focus();
                        }
                    }
                }
            });
        });

        // テキストエリア → テキストボックス 左矢印
        document.querySelectorAll('.input-row .textarea').forEach(textarea => {
            textarea.addEventListener('keydown', function (event) {
                if (event.key === 'ArrowLeft') {
                    const isAtStart = this.selectionStart === this.selectionEnd && this.selectionStart === 0;
                    if (isAtStart) {
                        const textbox = this.closest('.input-row').querySelector('.textbox');
                        if (textbox) {
                            event.preventDefault();
                            textbox.focus();
                            // 末尾にカーソルを移動
                            const length = textbox.value.length;
                            textbox.setSelectionRange(length, length);
                        }
                    }
                }
            });
        });

        const textareas = document.querySelectorAll("textarea");

        textareas.forEach((textarea, index) => {
            textarea.addEventListener("keydown", (e) => {
                const cursorPos = textarea.selectionStart;
                const textUntilCursor = textarea.value.slice(0, cursorPos);
                const currentLine = textUntilCursor.split("\n").length;
                const totalLines = textarea.value.split("\n").length;

                if (e.key === "ArrowDown") {
                    if (currentLine === totalLines && index < textareas.length - 1) {
                        e.preventDefault();
                        textareas[index + 1].focus();
                    }
                }

                if (e.key === "ArrowUp") {
                    if (currentLine === 1 && index > 0) {
                        e.preventDefault();
                        textareas[index - 1].focus();
                    }
                }
            });
        });

        const list = document.getElementById("customList");
        const selectionBox = document.getElementById("selectionBox");
        const items = ["りんご", "ぶどあ", "ぶどう", "ぶどうジュース", "パイナップル"];
        let activeIndex = -1;
        let currentInput = null;
        let lastCommittedValue = "";
        let isSelecting = false;
        let isCtrlPressed = false;
        let startX, startY;

        function showList(input) {
            currentInput = input;
            const val = input.value.toLowerCase();
            list.innerHTML = "";
            activeIndex = -1;

            if (!val) {
                list.style.display = "none";
                return;
            }

            const rect = input.getBoundingClientRect();
            list.style.top = `${window.scrollY + rect.bottom}px`;
            list.style.left = `${window.scrollX + rect.left}px`;
            list.style.width = `${rect.width}px`;

            const filtered = items.filter(item =>
                item.includes(val) && item.toLowerCase() !== val
            );

            if (filtered.length === 0) {
                list.style.display = "none";
                return;
            }

            filtered.forEach(item => {
                const li = document.createElement("li");
                li.textContent = item;
                li.addEventListener("mousedown", () => {
                    input.value = item;
                    lastCommittedValue = item;
                    list.style.display = "none";
                });
                list.appendChild(li);
            });

            list.style.display = "block";
        }

        function updateActiveOption(options) {
            options.forEach((li, idx) => {
                li.classList.toggle("active", idx === activeIndex);
                if (idx === activeIndex) {
                    li.scrollIntoView({ block: "nearest" });
                }
            });
        }


        document.addEventListener("click", (e) => {
            if (
                currentInput &&
                e.target !== currentInput &&
                !list.contains(e.target)
            ) {
                list.style.display = "none";
                activeIndex = -1;
            }
        });

        // 選択機能
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Control') isCtrlPressed = true;
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'Control') {
                isCtrlPressed = false;
                const selectedBoxes = Array.from(document.querySelectorAll('.textbox.selected'));
                if (selectedBoxes.length > 1) {
                    const value = prompt("入力する値を指定してください：");
                    if (value !== null) {
                        selectedBoxes.forEach(el => {
                            el.value = value;
                            el.blur();
                            el.classList.remove('selected');
                        });

                        const allBoxes = Array.from(document.querySelectorAll('.textbox'));
                        const lastSelected = selectedBoxes[selectedBoxes.length - 1];
                        const lastIndex = allBoxes.indexOf(lastSelected);
                        if (lastIndex >= 0 && lastIndex + 1 < allBoxes.length) {
                            allBoxes[lastIndex + 1].focus();
                        }
                    } else {
                        selectedBoxes.forEach(el => {
                            el.blur();
                            el.classList.remove('selected');
                        });
                    }
                }
            }
        });

        document.addEventListener('mousedown', (e) => {
            if (e.target.classList.contains('textbox') && isCtrlPressed) {
                e.target.classList.toggle('selected');
                return;
            }

            if (e.target.tagName !== 'INPUT') {
                isSelecting = true;
                startX = e.pageX;
                startY = e.pageY;

                selectionBox.style.left = startX + 'px';
                selectionBox.style.top = startY + 'px';
                selectionBox.style.width = '0px';
                selectionBox.style.height = '0px';
                selectionBox.style.display = 'block';

                document.querySelectorAll('.textbox').forEach(el => el.classList.remove('selected'));
            }
        });

        document.addEventListener('mousemove', (e) => {
            if (!isSelecting) return;

            const x = Math.min(e.pageX, startX);
            const y = Math.min(e.pageY, startY);
            const w = Math.abs(e.pageX - startX);
            const h = Math.abs(e.pageY - startY);

            selectionBox.style.left = x + 'px';
            selectionBox.style.top = y + 'px';
            selectionBox.style.width = w + 'px';
            selectionBox.style.height = h + 'px';

            const boxRect = selectionBox.getBoundingClientRect();
            document.querySelectorAll('.textbox').forEach(el => {
                const rect = el.getBoundingClientRect();
                const overlap = !(rect.right < boxRect.left ||
                    rect.left > boxRect.right ||
                    rect.bottom < boxRect.top ||
                    rect.top > boxRect.bottom);
                el.classList.toggle('selected', overlap);
            });
        });

        document.addEventListener('mouseup', () => {
            if (!isSelecting) return;
            isSelecting = false;
            selectionBox.style.display = 'none';

            const selectedBoxes = Array.from(document.querySelectorAll('.textbox.selected'));
            if (selectedBoxes.length > 1) {
                const value = prompt("入力する値を指定してください：");
                if (value !== null) {
                    selectedBoxes.forEach(el => {
                        el.value = value;
                        el.blur();
                        el.classList.remove('selected');
                    });

                    const allBoxes = Array.from(document.querySelectorAll('.textbox'));
                    const lastSelected = selectedBoxes[selectedBoxes.length - 1];
                    const lastIndex = allBoxes.indexOf(lastSelected);
                    if (lastIndex >= 0 && lastIndex + 1 < allBoxes.length) {
                        allBoxes[lastIndex + 1].focus();
                    }
                } else {
                    selectedBoxes.forEach(el => {
                        el.blur();
                        el.classList.remove('selected');
                    });
                }
            }
        });

        function sortByTextbox() {
            const container = document.getElementById("container");
            const rows = Array.from(container.getElementsByClassName("input-row"));

            // 値を取得してソート
            rows.sort((a, b) => {
                const aValue = a.querySelector(".textbox").value;
                const bValue = b.querySelector(".textbox").value;
                return aValue.localeCompare(bValue, 'ja');
            });

            // 一旦中身をクリアしてソートされた順に再挿入
            container.innerHTML = "";
            rows.forEach(row => container.appendChild(row));
        }

        function exportToOrg() {
            const rows = document.querySelectorAll('.input-row');
            const outlineMap = new Map();

            rows.forEach(row => {
                const title = row.querySelector('.textbox').value.trim() || '未整理';
                const content = row.querySelector('.textarea').value.trim();

                // テキストエリアが空ならスキップ
                if (content === '') return;

                if (!outlineMap.has(title)) {
                    outlineMap.set(title, []);
                }
                outlineMap.get(title).push(content);
            });

            
            // 20251215 バグってそうなので一旦コメントアウト。
            // const sortedMap = new Map(
            //  [...outlineMap].sort((a, b) => a[0].localeCompare(b[0]))
            // );          

            const sortedMap = outlineMap;

            let orgText = '';

            for (const [title, contents] of sortedMap.entries()) {
                // 本文が空のアウトラインは出力しない
                if (contents.length === 0) continue;

                orgText += `** ${title}\n\n`;
                contents.forEach(text => {
                    orgText += `${text}\n\n\n`;
                });
            }

            if (orgText === '') {
                alert("出力する内容がありません。");
                return;
            }

            const blob = new Blob([orgText], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'export.org';
            a.click();
        }

        /**
         * import テキストをブロックに分割する（従来どおり「空行1行＝実質 \n\n」で区切る）。
         * ただし ``` で始まる行から次の ``` で始まる行までの間はフェンス内とみなし、
         * その中の空行ではブロック分割しない。
         */
        function splitImportIntoBlocks(raw) {
            // textarea は環境により CRLF のことがあり、split('\n') だけだと「空行」が '\r' になり
            // line === '' と一致せず、フェンス検知やブロック分割が壊れる
            const normalized = String(raw)
                .replace(/^\uFEFF/, '')
                .replace(/\r\n/g, '\n')
                .replace(/\r/g, '\n');

            const lines = normalized.split('\n');
            const blocks = [];
            let current = [];
            let inFence = false;

            for (let idx = 0; idx < lines.length; idx++) {
                const line = lines[idx];
                const isFenceLine = /^\s*```/.test(line);

                if (isFenceLine) {
                    current.push(line);
                    inFence = !inFence;
                    continue;
                }

                if (!inFence && line === '') {
                    if (current.length > 0) {
                        const trimmedBlock = current.join('\n').trim();
                        if (trimmedBlock !== '') blocks.push(trimmedBlock);
                        current = [];
                    }
                    while (idx + 1 < lines.length && lines[idx + 1] === '') {
                        idx++;
                    }
                    continue;
                }

                current.push(line);
            }

            const trimmedBlock = current.join('\n').trim();
            if (trimmedBlock !== '') blocks.push(trimmedBlock);
            return blocks;
        }

        function expandToTextareas() {
            const raw = document.getElementById('importBox').value;

            const blocks = splitImportIntoBlocks(raw);

            const container = document.getElementById('container');
            let textareas = container.querySelectorAll('.textarea');
            const existingCount = textareas.length;
            const neededCount = blocks.length;

            // 不足している分だけテキストボックス＋テキストエリアを追加
            if (neededCount > existingCount) {
                for (let i = 0; i < neededCount - existingCount; i++) {
                    const row = document.createElement('div');
                    row.className = 'input-row';

                    const input = document.createElement('input');
                    input.type = 'text';
                    input.className = 'textbox';
                    input.tabIndex = 6 + i;
                    input.type = "search";
                    input.autocomplete = "off";

                    // ✅ ここで追加した input に対して補完を設定！
                    setupAutocomplete(input);  // ← これをこの中に置く！                    

                    const textarea = document.createElement('textarea');
                    textarea.className = 'textarea';

                    row.appendChild(input);
                    row.appendChild(textarea);
                    container.appendChild(row);
                }
            }

            // すべてのテキストエリアを取得しなおす（追加された分も含めて）
            textareas = container.querySelectorAll('.textarea');

            // ブロックを順番にテキストエリアに入力
            for (let i = 0; i < blocks.length; i++) {
                textareas[i].value = blocks[i];
                textareas[i].style.height = "auto"; // 一旦リセット
                textareas[i].style.height = textareas[i].scrollHeight + "px"; // 内容に応じて再設定
            }
        }


        const OUTLINE_LV2_RE = /^\*\* /;

        function isOutlineLv2(block) {
            return OUTLINE_LV2_RE.test(block);
        }

        function parseOutlineLv2Title(block) {
            const title = block.slice(3).trim();
            return title === '' ? 'blank' : title;
        }

        /** org text 展開に必要な入力行数（outline_lv2 は行を増やさない） */
        function countRowsForOrgExpand(blocks) {
            let n = 0;
            for (const b of blocks) {
                if (isOutlineLv2(b)) continue;
                n++;
            }
            return n;
        }

        function expandToTextareasByOrg() {
            const raw = document.getElementById('importBox').value;

            const blocks = splitImportIntoBlocks(raw);

            const container = document.getElementById('container');
            let textareas = container.querySelectorAll('.textarea');
            const existingCount = textareas.length;
            const neededCount = Math.max(countRowsForOrgExpand(blocks), 1);

            // 不足している分だけテキストボックス＋テキストエリアを追加
            if (neededCount > existingCount) {
                for (let i = 0; i < neededCount - existingCount; i++) {
                    const row = document.createElement('div');
                    row.className = 'input-row';

                    const input = document.createElement('input');
                    input.type = 'text';
                    input.className = 'textbox';
                    input.tabIndex = 6 + i;
                    input.type = "search";
                    input.autocomplete = "off";

                    // ✅ ここで追加した input に対して補完を設定！
                    setupAutocomplete(input);  // ← これをこの中に置く！                    

                    const textarea = document.createElement('textarea');
                    textarea.className = 'textarea';

                    row.appendChild(input);
                    row.appendChild(textarea);
                    container.appendChild(row);
                }
            }

            // すべてのテキストエリアを取得しなおす（追加された分も含めて）
            textareas = container.querySelectorAll('.textarea');
            textboxes = container.querySelectorAll('.textbox');

            // outline_lv2（`** `）のみ見出し。`**xxx` などスペースなしは本文としてそのまま展開
            let spacedHeading = '';
            let bodyRow = 0;
            for (let i = 0; i < blocks.length; i++) {
                const block = blocks[i];

                if (isOutlineLv2(block)) {
                    spacedHeading = parseOutlineLv2Title(block);
                    continue;
                }

                if (spacedHeading !== '') {
                    textboxes[bodyRow].value = spacedHeading;
                    textareas[bodyRow].value = block;
                    textareas[bodyRow].style.height = "auto";
                    textareas[bodyRow].style.height = textareas[bodyRow].scrollHeight + "px";
                    bodyRow++;
                    continue;
                }

                let title = '';
                if (bodyRow > 0) {
                    title = textboxes[bodyRow - 1].value;
                }
                textboxes[bodyRow].value = title;
                textareas[bodyRow].value = block;
                textareas[bodyRow].style.height = "auto";
                textareas[bodyRow].style.height = textareas[bodyRow].scrollHeight + "px";
                bodyRow++;
            }
        }

        function toggleImportSection() {
            const section = document.getElementById('importSection');
            const btn = document.getElementById('toggleBtn');

            if (section.style.display === 'none') {
                section.style.display = 'block';
                btn.textContent = '🔽 hide import text area';
            } else {
                section.style.display = 'none';
                btn.textContent = '🔼 show import text area';
            }
        }

        function setupAutocomplete(input) {
            input.addEventListener("input", () => showList(input));

            input.addEventListener("change", () => {
                const val = input.value.trim();
                if (!val) return;

                const existingIndex = items.indexOf(val);
                if (existingIndex !== -1) {
                    items.splice(existingIndex, 1);
                }
                items.unshift(val);
                lastCommittedValue = val;
                showList(input);
            });

            input.addEventListener("blur", () => {
                const val = input.value.trim();
                if (val && !items.includes(val)) {
                    items.unshift(val);
                }
            });

            input.addEventListener("keydown", (e) => {
                const options = list.querySelectorAll("li");

                if (e.altKey && e.key.toLowerCase() === "u") {
                    e.preventDefault();
                    if (lastCommittedValue) {
                        input.value = lastCommittedValue;
                        showList(input);
                    }
                    return;
                }

                if (list.style.display === "block" && options.length > 0) {
                    if (e.key === "ArrowDown") {
                        e.preventDefault();
                        activeIndex = (activeIndex + 1) % options.length;
                        updateActiveOption(options);
                    } else if (e.key === "ArrowUp") {
                        e.preventDefault();
                        activeIndex = (activeIndex - 1 + options.length) % options.length;
                        updateActiveOption(options);
                    } else if (e.key === "Enter" && activeIndex >= 0) {
                        e.preventDefault();
                        const selected = options[activeIndex].textContent;
                        input.value = selected;
                        lastCommittedValue = selected;
                        list.style.display = "none";
                        activeIndex = -1;
                    }
                }
            });

            input.addEventListener("focusout", () => {
                setTimeout(() => {
                    if (
                        document.activeElement !== list &&
                        !list.contains(document.activeElement)
                    ) {
                        list.style.display = "none";
                        activeIndex = -1;
                    }
                }, 10);
            });
        }

        document.querySelectorAll('.textbox').forEach(setupAutocomplete);

        function outputToTextarea() {
            const rows = document.querySelectorAll('.input-row');
            const outlineMap = new Map();

            rows.forEach(row => {
                const title = row.querySelector('.textbox').value.trim() || '未整理';
                const content = row.querySelector('.textarea').value.trim();

                // テキストエリアが空ならスキップ
                if (content === '') return;

                if (!outlineMap.has(title)) {
                    outlineMap.set(title, []);
                }
                outlineMap.get(title).push(content);
            });

            // 20251215 なんだかバグってそうなので一旦コメントアウト
            // const sortedMap = new Map(
            //   [...outlineMap].sort((a, b) => a[0].localeCompare(b[0]))
            // );

            const sortedMap = outlineMap;

            // '未整理'を最後に移動
            const value = sortedMap.get('未整理'); // 値を取得
            sortedMap.delete('未整理');            // 一度削除
            sortedMap.set('未整理', value);        // 再度追加（→ 末尾に来る）　

            let orgText = '';

            for (const [title, contents] of sortedMap.entries()) {
                if (contents == null || contents.length === 0) continue;

                orgText += `** ${title}\n\n`;
                contents.forEach(text => {
                    orgText += `${text}\n\n\n`;
                });
            }

            document.getElementById("orgExportArea").value = orgText;
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }
    </script>
</body>
